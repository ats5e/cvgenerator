<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>$pdf_title</title>
    <style>
        @page {
            size: A4;
            margin: 0;
        }

        :root {
            --paper: #f5f1ec;
            --ink: #1f1a16;
            --muted: #6b625c;
            --accent: #8a4a2b;
            --rule: #d9d0c8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            background: var(--paper);
        }

        body {
            background: var(--paper);
            color: var(--ink);
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            font-size: 9pt;
            line-height: 1.45;
            margin: 0;
            padding: 0;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        .document {
            background: var(--paper);
            min-height: 100vh;
            padding: 14mm 34px 12mm;
        }

        .header {
            align-items: flex-start;
            display: flex;
            gap: 24px;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .header-copy {
            flex: 1;
            min-width: 0;
            padding-top: 4px;
        }

        .header-image {
            width: 116px;
            height: 116px;
            border: 2px solid #d7cec6;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }

        .name {
            font-family: Baskerville, Georgia, "Times New Roman", serif;
            font-size: 34pt;
            line-height: 1;
            margin-bottom: 8px;
            white-space: nowrap;
        }

        .first-name {
            color: var(--accent);
            display: inline;
            font-style: italic;
        }

        .last-name {
            color: var(--ink);
            display: inline;
        }

        .tagline {
            color: #433b35;
            font-family: Baskerville, Georgia, "Times New Roman", serif;
            font-size: 10.2pt;
            font-style: italic;
            margin-bottom: 8px;
        }

        .contact-line {
            color: var(--muted);
            font-size: 7.7pt;
            margin-bottom: 10px;
        }

        .meta-row {
            border-bottom: 1px solid var(--ink);
            border-top: 1px solid var(--rule);
            display: grid;
            gap: 16px;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            margin-bottom: 14px;
            padding: 8px 0 7px;
        }

        .meta-label {
            color: var(--muted);
            font-size: 6.2pt;
            letter-spacing: 1.4px;
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .meta-value {
            color: var(--accent);
            font-family: Baskerville, Georgia, "Times New Roman", serif;
            font-size: 12.5pt;
            font-style: italic;
            line-height: 1.2;
        }

        .section {
            margin-top: 10px;
        }

        .section-heading {
            align-items: baseline;
            display: flex;
            gap: 8px;
            margin-bottom: 4px;
        }

        .section-number {
            color: var(--accent);
            font-family: Baskerville, Georgia, "Times New Roman", serif;
            font-size: 15pt;
        }

        .section-title {
            color: var(--ink);
            font-family: Baskerville, Georgia, "Times New Roman", serif;
            font-size: 15.5pt;
            font-style: italic;
        }

        .section-rule {
            border: none;
            border-top: 1px solid var(--rule);
            margin-bottom: 9px;
        }

        .letter-date,
        .letter-recipient,
        .letter-signoff {
            color: #423a34;
            font-size: 8.7pt;
        }

        .letter-date {
            margin-bottom: 8px;
        }

        .letter-recipient {
            margin-bottom: 10px;
        }

        .letter-body p {
            color: #423a34;
            font-size: 8.7pt;
            line-height: 1.62;
            margin-bottom: 10px;
            text-align: justify;
        }

        .drop-cap {
            color: var(--accent);
            float: left;
            font-family: Baskerville, Georgia, "Times New Roman", serif;
            font-size: 13pt;
            font-style: italic;
            line-height: 1;
            margin-right: 1px;
        }

        .signature-name {
            color: var(--ink);
            font-family: Baskerville, Georgia, "Times New Roman", serif;
            font-size: 12pt;
            font-style: italic;
            margin-top: 4px;
        }

        .footer {
            border-top: 1px solid var(--ink);
            margin-top: 18px;
            padding-top: 8px;
            text-align: center;
        }

        .footer-title {
            color: var(--ink);
            font-size: 6.8pt;
            letter-spacing: 1.7px;
            text-transform: uppercase;
        }

        .footer-subtitle {
            color: var(--muted);
            font-size: 6.7pt;
            letter-spacing: 1.3px;
            margin-top: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="document">
        <div class="header">
            <div class="header-copy">
                <div class="name">
                    <span class="first-name">$first_name</span>
                    <span class="last-name">$last_name</span>
                </div>

                <div class="tagline">$tagline</div>
                <div class="contact-line">$contact_line</div>
            </div>

            <img class="header-image" src="$img_path" alt="Du-Toit Griesel headshot">
        </div>

        <div class="meta-row">
$meta_html
        </div>

        <section class="section">
            <div class="section-heading">
                <span class="section-number">01</span>
                <span class="section-title">Cover Letter</span>
            </div>
            <hr class="section-rule">

            <div class="letter-date">$letter_date</div>
            <div class="letter-recipient">$letter_recipient</div>

            <div class="letter-body">
$letter_body_html
            </div>

            <div class="letter-signoff">$signoff</div>
            <div class="signature-name">$signature_name</div>
        </section>

        <div class="footer">
            <div class="footer-title">$first_name $last_name | $footer_title | Dubai, UAE</div>
            <div class="footer-subtitle">$footer_subtitle</div>
        </div>
    </div>
</body>
</html>
