<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>$pdf_title</title>
    <style>
        @page {
            size: A4;
            margin: 0;
        }

        :root {
            --paper: #ffffff;
            --ink: #151515;
            --muted: #5f6368;
            --rule: #d8dce1;
            --soft: #f5f6f8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            background: var(--paper);
        }

        body {
            background: var(--paper);
            color: var(--ink);
            font-family: Arial, Helvetica, sans-serif;
            font-size: 9pt;
            line-height: 1.45;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        .document {
            min-height: 100vh;
            padding: 15mm 16mm 12mm;
        }

        .header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 18px;
            padding-bottom: 9px;
            border-bottom: 1.5px solid var(--ink);
        }

        .header-copy {
            flex: 1;
            min-width: 0;
        }

        .header-image {
            width: 82px;
            height: 82px;
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .name {
            font-size: 25pt;
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1;
        }

        .first-name,
        .last-name {
            display: inline;
        }

        .tagline {
            margin-top: 6px;
            font-size: 10pt;
            color: var(--ink);
            font-weight: 600;
            letter-spacing: 0.03em;
        }

        .contact-line {
            margin-top: 6px;
            color: var(--muted);
            font-size: 8pt;
        }

        .meta-row {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px;
            margin-top: 10px;
        }

        .meta-item {
            padding: 8px 9px;
            border: 1px solid var(--rule);
            background: var(--soft);
        }

        .meta-label {
            color: var(--muted);
            font-size: 6.8pt;
            margin-bottom: 4px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .meta-value {
            color: var(--ink);
            font-size: 8.8pt;
            font-weight: 700;
            line-height: 1.35;
        }

        .section {
            margin-top: 14px;
        }

        .section-heading {
            border-bottom: 1px solid var(--rule);
            margin-bottom: 8px;
            padding-bottom: 4px;
        }

        .section-number {
            color: var(--muted);
            font-size: 7.1pt;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        .section-title {
            display: block;
            margin-top: 2px;
            font-size: 10.2pt;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .section-rule {
            display: none;
        }

        .letter-date,
        .letter-recipient,
        .letter-signoff {
            color: #2a2f34;
            font-size: 8.6pt;
        }

        .letter-date {
            margin-bottom: 8px;
        }

        .letter-recipient {
            margin-bottom: 10px;
            font-weight: 700;
        }

        .letter-body p {
            color: #2a2f34;
            font-size: 8.55pt;
            line-height: 1.58;
            margin-bottom: 10px;
            text-align: justify;
        }

        .drop-cap {
            font-weight: 700;
        }

        .signature-name {
            color: var(--ink);
            font-size: 9.4pt;
            font-weight: 700;
            margin-top: 4px;
        }

        .footer {
            margin-top: 18px;
            padding-top: 8px;
            border-top: 1px solid var(--rule);
            color: var(--muted);
            font-size: 7.2pt;
        }

        .footer-title {
            color: var(--ink);
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .footer-subtitle {
            margin-top: 3px;
        }
    </style>
</head>
<body>
    <div class="document">
        <div class="header">
            <div class="header-copy">
                <div class="name">
                    <span class="first-name">$first_name</span>
                    <span class="last-name">$last_name</span>
                </div>
                <div class="tagline">$tagline</div>
                <div class="contact-line">$contact_line</div>
            </div>
            $header_image_html
        </div>

        $meta_section_html

        <section class="section">
            <div class="section-heading">
                <span class="section-number">01</span>
                <span class="section-title">Cover Letter</span>
            </div>
            <hr class="section-rule">

            <div class="letter-date">$letter_date</div>
            <div class="letter-recipient">$letter_recipient</div>

            <div class="letter-body">
$letter_body_html
            </div>

            <div class="letter-signoff">$signoff</div>
            <div class="signature-name">$signature_name</div>
        </section>

        <div class="footer">
            <div class="footer-title">$first_name $last_name | $footer_title</div>
            <div class="footer-subtitle">$footer_subtitle</div>
        </div>
    </div>
</body>
</html>
